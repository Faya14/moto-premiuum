<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - MOTO PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
             margin: 0;
              padding: 0;
               box-sizing: border-box;
             }
        :root {
            --cream: #faf7f5; 
            --blush: #f4e4e1;
             --lavender: #e8e0f0;
            --mint: #d4e8e0; 
            --text-dark: #2d2d3a;
             --text-light: #6b6b7b;
            --accent-rose: #e8a0a0; 
            --accent-lavender: #b8a9d4;
        }
        body {
             font-family: 'Montserrat', sans-serif;
              background: var(--cream); 
              color: var(--text-dark);
             }
        
        header {
             position: fixed; 
             top: 0; 
             width: 100%; 
             z-index: 1000; 
             padding: 1rem 3%; 
             background: rgba(255,255,255,0.95);
              backdrop-filter: blur(20px);
               box-shadow: 0 4px 30px rgba(0,0,0,0.05); 
            }
        nav { 
            display: flex; 
            justify-content: space-between;
             align-items: center; max-width: 1400px; 
             margin: 0 auto; 
            }
        .logo { 
            display: flex; 
            align-items: center;
             gap: 15px; 
             text-decoration: none; 
            }
        .logo-img { 
            width: 50px; 
            height: 50px;
             border-radius: 50%; 
             border: 3px solid var(--accent-rose); 
            }
        .logo-text { 
            font-family: 'Playfair Display', serif; font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--text-dark);
         }
        .logo-text span { 
            color: var(--accent-rose); 
        }
        .nav-links {
             display: flex;
              list-style: none;
               gap: 2rem; 
               align-items: center; 
            }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-dark); 
            font-weight: 600;
             font-size: 0.85rem; 
             text-transform: uppercase; 
             letter-spacing: 1px; 
             transition: color 0.3s;
             }
        .nav-links a:hover {
             color: var(--accent-rose);
             }
        .btn-register {
             background: linear-gradient(135deg, var(--accent-rose), var(--accent-lavender)) !important; 
             color: white !important;
              padding: 12px 28px !important; 
              border-radius: 30px !important; 
              box-shadow: 0 4px 20px rgba(232,160,160,0.4); 
            }
        .cart-link {
             position: relative;
             }
        .cart-count {
             position: absolute; 
             top: -8px;
              right: -12px; 
              background: var(--accent-rose); 
              color: white;
               border-radius: 50%;
                width: 20px; 
                height: 20px;
                 font-size: 0.7rem; 
                 display: flex; 
                 align-items: center;
                  justify-content: center; 
                  font-weight: 700; 
                }

        .page-hero {
             margin-top: 90px;
              padding: 4rem 5%; 
              background: linear-gradient(135deg, var(--blush), var(--lavender));
               text-align: center;
             }
        .page-title {
             font-family: 'Playfair Display', serif;
              font-size: 3rem;
               margin-bottom: 1rem; 
            }
        .page-subtitle { 
            color: var(--text-light); 
            font-size: 1.1rem;
         }

        .catalog-section { 
            padding: 4rem 5%; 
            max-width: 1400px;
             margin: 0 auto;
             }
        
        .filters {
             display: flex; 
             justify-content: center; 
             gap: 1rem; 
             margin-bottom: 3rem;
              flex-wrap: wrap; 
            }
        .filter-btn {
             padding: 12px 28px;
              border: 2px solid var(--blush); 
              background: white;
               border-radius: 30px;
                cursor: pointer;
                 font-weight: 600; 
                 transition: all 0.3s;
                  font-family: 'Montserrat';
                 }
        .filter-btn:hover, .filter-btn.active {
             background: linear-gradient(135deg, var(--accent-rose), var(--accent-lavender)); 
             color: white;
              border-color: transparent;
               transform: translateY(-2px); 
            }

        .catalog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 2rem;
         }
        
        .product-card { 
            background: white;
             border-radius: 20px; 
             overflow: hidden; 
             box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
             transition: all 0.4s; }
        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
        }
        .product-image { 
            height: 250px;
             overflow: hidden; 
             position: relative; 
            }
        .product-image img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s; 
        }
        .product-card:hover .product-image img { 
            transform: scale(1.1); 
        }
        .product-badge { 
            position: absolute; 
            top: 15px;
             left: 15px;
              background: var(--accent-rose); 
              color: white; 
              padding: 5px 15px;
               border-radius: 20px; 
               font-size: 0.8rem; 
               font-weight: 700;
             }
        .product-info {
             padding: 1.5rem;
             }
        .product-category {
             color: var(--accent-rose);
              font-size: 0.85rem; 
              font-weight: 600;
               text-transform: uppercase;
                margin-bottom: 0.5rem; 
            }
        .product-name {
             font-family: 'Playfair Display', serif;
              font-size: 1.4rem; 
              margin-bottom: 0.5rem; 
            }
        .product-specs { 
            color: var(--text-light); 
            font-size: 0.9rem; 
            margin-bottom: 1rem; 
            line-height: 1.6; 
        }
        .product-footer {
             display: flex; 
             justify-content: space-between;
              align-items: center; 
            }
        .product-price {
             font-size: 1.5rem; 
             font-weight: 800; 
             color: var(--text-dark); 
            }
        .product-price span {
             font-size: 0.9rem; 
             color: var(--text-light);
              font-weight: 400;
             }
        .btn-add-cart {
             background: linear-gradient(135deg, var(--accent-rose), var(--accent-lavender));
              color: white;
               border: none;
                padding: 10px 20px;
                border-radius: 25px;
                cursor: pointer; 
                font-weight: 700; 
                transition: all 0.3s;
                font-family: 'Montserrat';
                 }
        .btn-add-cart:hover {
             transform: scale(1.05);
              box-shadow: 0 8px 20px rgba(232,160,160,0.4); 
            }

        footer { 
            background: var(--text-dark);
            color: white;
            padding: 3rem 5% 2rem; 
            text-align: center; 
            margin-top: 4rem; 
        }
        .social-links {
             display: flex; 
             justify-content: center; 
             gap: 1.5rem; margin: 2rem 0;
             }
        .social-links a {
             width: 50px;
              height: 50px;
               border-radius: 50%; 
               background: rgba(255,255,255,0.1); 
               display: flex; align-items: center; 
               justify-content: center; 
               color: white; 
               font-size: 1.2rem; 
               transition: all 0.3s; 
               text-decoration: none; 
            }
        .social-links a:hover { 
            background: var(--accent-rose);
             transform: translateY(-5px) rotate(360deg); 
            }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .page-title { font-size: 2rem; }
            .catalog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo-icon.png" alt="MOTO PREMIUM" class="logo-img">
                <span class="logo-text">MOTO <span>PREMIUM</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="about.html">О компании</a></li>
                <li><a href="services.html">Услуги</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="reviews.html">Отзывы</a></li>
                <li><a href="delivery.html">Доставка</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="register.html" class="btn-register">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero">
        <h1 class="page-title">Каталог мотоциклов</h1>
        <p class="page-subtitle">Более 50 моделей премиальных мотоциклов в наличии</p>
    </section>

    <section class="catalog-section">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="sport">Спортивные</button>
            <button class="filter-btn" data-filter="cruiser">Круизеры</button>
            <button class="filter-btn" data-filter="touring">Туристические</button>
            <button class="filter-btn" data-filter="adventure">Приключенческие</button>
        </div>

        <div class="catalog-grid" id="catalogGrid">
            <!-- Товары добавляются через JS -->
        </div>
    </section>

    <footer>
        <div class="logo-text" style="color:white; font-size:1.8rem; margin-bottom:1rem;">MOTO <span style="color:var(--accent-rose)">PREMIUM</span></div>
        <p>Ваш надёжный партнёр в мире мотоциклов</p>
        <div class="social-links">
            <a href="#"><i class="fab fa-vk"></i></a>
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
        <p style="margin-top:2rem; opacity:0.6;">&copy; 2026 MOTO PREMIUM. Все права защищены.</p>
    </footer>

    <script>
        // Данные каталога
const products = [
    { 
        id: 1, 
        name: "Yamaha YZF-R1", 
        category: "sport", 
        price: 1850000, 
        specs: "998 см³ • 200 л.с. • 201 кг", 
        badge: "Хит", 
        image: "images/Yamaha YZF-R1.jpg"  // ← Локальное фото
    },
    { 
        id: 2, 
        name: "Harley-Davidson Fat Boy", 
        category: "cruiser", 
        price: 2100000, 
        specs: "1868 см³ • 100 л.с. • 317 кг", 
        badge: "New", 
        image: "images/Harley-Davidson Fat Boy.jpg"  // ← Локальное фото
    },
    { 
        id: 3, 
        name: "BMW R 1250 RT", 
        category: "touring", 
        price: 2350000, 
        specs: "1254 см³ • 136 л.с. • 279 кг", 
        badge: "", 
        image: "images/BMW R 1250 RT.jpg"  // ← Локальное фото
    },
    { 
        id: 4, 
        name: "Ducati Panigale V4", 
        category: "sport", 
        price: 2650000, 
        specs: "1103 см³ • 214 л.с. • 198 кг", 
        badge: "Premium", 
        image: "images/Ducati Panigale V4.jpg"  // ← Локальное фото
    },
    { 
        id: 5, 
        name: "Kawasaki Ninja ZX-10R", 
        category: "sport", 
        price: 1750000, 
        specs: "998 см³ • 203 л.с. • 207 кг", 
        badge: "", 
        image: "images/Kawasaki Ninja ZX-10R.jpg"  // ← Локальное фото
    },
    { 
        id: 6, 
        name: "BMW R 1250 GS", 
        category: "adventure", 
        price: 2200000, 
        specs: "1254 см³ • 136 л.с. • 249 кг", 
        badge: "Хит", 
        image: "images/BMW R 1250 GS.jpg"  // ← Локальное фото
    },
];

        // Рендер каталога
        function renderCatalog(filter = 'all') {
            const grid = document.getElementById('catalogGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}">
                        ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${getCategoryName(p.category)}</div>
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-specs">${p.specs}</p>
                        <div class="product-footer">
                            <div class="product-price">${p.price.toLocaleString('ru-RU')} <span>₽</span></div>
                            <button class="btn-add-cart" onclick="addToCart(${p.id})">
                                <i class="fas fa-cart-plus"></i> В корзину
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryName(cat) {
            const names = { sport: 'Спортивный', cruiser: 'Круизер', touring: 'Туристический', adventure: 'Приключенческий' };
            return names[cat] || cat;
        }

        // Фильтрация
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCatalog(btn.dataset.filter);
            });
        });

        // Корзина
        function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
        function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); }

        function addToCart(id) {
            const cart = getCart();
            const existing = cart.find(item => item.id === id);
            if (existing) { existing.qty++; } 
            else { cart.push({ id, qty: 1 }); }
            saveCart(cart);
            
            // Анимация
            const btn = event.target.closest('.btn-add-cart');
            btn.innerHTML = '<i class="fas fa-check"></i> Добавлено';
            btn.style.background = 'var(--accent-mint)';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-cart-plus"></i> В корзину';
                btn.style.background = '';
            }, 1500);
        }

        function updateCartCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        renderCatalog();
        updateCartCount();
    </script>
</body>
</html>
