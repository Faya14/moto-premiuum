<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина - MOTO PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; 
            padding: 0;
             box-sizing: border-box; 
            }
        :root {
            --cream: #faf7f5; 
            --blush: #f4e4e1; 
            --lavender: #e8e0f0;
            --text-dark: #2d2d3a;
             --text-light: #6b6b7b;
            --accent-rose: #e8a0a0;
             --accent-lavender: #b8a9d4;
            --success: #27ae60;
        }
        body { font-family: 'Montserrat', sans-serif;
         background: var(--cream);
         color: var(--text-dark); 
        }
        
        header { 
        position: fixed; 
        top: 0; 
        width: 100%;
         z-index: 1000; 
         padding: 1rem 3%;
          background: rgba(255,255,255,0.95); 
          backdrop-filter: blur(20px); 
          box-shadow: 0 4px 30px rgba(0,0,0,0.05);
         }
        nav { 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
         max-width: 1400px;
          margin: 0 auto; 
        }
        .logo {
             display: flex; 
             align-items: center; 
             gap: 15px; 
             text-decoration: none; 
            }
        .logo-img {
             width: 50px; 
             height: 50px; 
             border-radius: 50%; 
             border: 3px solid var(--accent-rose);
             }
        .logo-text { 
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--text-dark); 
        }
        .logo-text span {
             color: var(--accent-rose); 
            }
        .nav-links { 
            display: flex;
             list-style: none;
              gap: 2rem; 
              align-items: center; 
            }
        .nav-links a { 
            text-decoration: none;
             color: var(--text-dark); 
             font-weight: 600; 
             font-size: 0.85rem;
              text-transform: uppercase; 
              transition: color 0.3s;
             }
        .nav-links a:hover {
             color: var(--accent-rose); 
            }
        .btn-register { 
            background: linear-gradient(135deg, var(--accent-rose), var(--accent-lavender)) !important; 
            color: white !important; padding: 12px 28px !important; border-radius: 30px !important;
             box-shadow: 0 4px 20px rgba(232,160,160,0.4);
             }
        .cart-link {
             position: relative;
             }
        .cart-count {
             position: absolute; 
             top: -8px; 
             right: -12px;
              background: var(--accent-rose); 
              color: white; 
              border-radius: 50%; 
              width: 20px; 
              height: 20px; 
              font-size: 0.7rem; 
              display: flex; 
              align-items: center; 
              justify-content: center; 
              font-weight: 700; 
            }

        .page-hero {
             margin-top: 90px;
              padding: 4rem 5%;
               background: linear-gradient(135deg, var(--blush), var(--lavender)); 
               text-align: center;
             }
        .page-title {
             font-family: 'Playfair Display', serif; 
             font-size: 3rem; 
             margin-bottom: 1rem;
             }

        .cart-section {
             padding: 4rem 5%; 
             max-width: 1200px; 
             margin: 0 auto;
             }
        
        .cart-empty { 
            text-align: center; 
            padding: 4rem 2rem; 
            background: white; 
            border-radius: 20px; 
        }
        .cart-empty i { 
            font-size: 5rem;
             color: var(--accent-rose);
              margin-bottom: 1rem; 
            }
        .cart-empty h2 {
             font-family: 'Playfair Display', serif;
              margin-bottom: 1rem;
             }
        .cart-empty p {
             color: var(--text-light); 
             margin-bottom: 2rem; 
            }

        .cart-items {
             display: flex;
              flex-direction: column;
               gap: 1.5rem; 
            }
        .cart-item { 
            display: grid; 
            grid-template-columns: 120px 1fr auto auto auto;
             gap: 2rem; 
             align-items: center; 
             background: white;
              padding: 1.5rem; 
              border-radius: 20px;
               box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            }
        .cart-item img { 
            width: 120px; 
            height: 90px;
             object-fit: cover; 
             border-radius: 10px; 
            }
        .cart-item-info h3 {
             font-family: 'Playfair Display', serif;
              margin-bottom: 0.3rem; 
            }
        .cart-item-info p { 
            color: var(--text-light);
             font-size: 0.9rem;
             }
        
        .qty-control { 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            background: var(--blush); 
            border-radius: 25px;
             padding: 5px; 
            }
        .qty-btn { 
            width: 30px;
             height: 30px; 
             border-radius: 50%; 
             border: none; 
             background: white;
              cursor: pointer;
               font-weight: 700; 
               transition: all 0.3s;
             }
        .qty-btn:hover { 
            background: var(--accent-rose); 
            color: white;
         }
        .qty-num {
             font-weight: 700; 
             min-width: 25px; 
             text-align: center;
             }
        
        .item-price {
             font-size: 1.3rem; 
             font-weight: 800;
              min-width: 150px; 
              text-align: right; 
            }
        .remove-btn { 
            background: none;
             border: none;
              color: var(--accent-rose);
               cursor: pointer; 
               font-size: 1.2rem; 
               transition: transform 0.3s; 
            }
        .remove-btn:hover { 
            transform: scale(1.3); 
        }

        .cart-summary {
             background: white; 
             padding: 2rem; 
             border-radius: 20px;
              margin-top: 2rem; 
              box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            }
        .summary-row { 
            display: flex;
             justify-content: space-between;
              margin-bottom: 1rem; font-size: 1.1rem;
             }
        .summary-row.total { 
            font-size: 1.5rem; 
            font-weight: 800;
             padding-top: 1rem;
              border-top: 2px solid var(--blush);
               margin-top: 1rem; 
            }
        
        .checkout-btn { 
            width: 100%;
             padding: 18px;
              background: linear-gradient(135deg, var(--accent-rose), var(--accent-lavender)); 
              color: white;
               border: none; 
               border-radius: 30px;
                font-size: 1.1rem;
                 font-weight: 700; 
                 cursor: pointer; 
                 margin-top: 1.5rem; 
                 transition: all 0.3s; 
                 font-family: 'Montserrat';
                  text-transform: uppercase; 
                 letter-spacing: 1px;
                 }
        .checkout-btn:hover { 
            transform: translateY(-3px);
             box-shadow: 0 12px 35px rgba(232,160,160,0.5);
             }
        .checkout-btn:disabled { 
            opacity: 0.5;
             cursor: not-allowed; 
             transform: none; 
            }

        .back-link {
             display: inline-block; 
             margin-top: 1rem; 
             color: var(--accent-rose);
              text-decoration: none;
               font-weight: 600;
             }
        .back-link:hover {
             text-decoration: underline; 
            }

        footer { 
            background: var(--text-dark);
             color: white;
              padding: 3rem 5% 2rem; 
              text-align: center; 
              margin-top: 4rem;
             }
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 1.5rem;
             margin: 2rem 0; 
            }
        .social-links a {
             width: 50px;
              height: 50px;
               border-radius: 50%;
                background: rgba(255,255,255,0.1);
                 display: flex;
                  align-items: center; 
                  justify-content: center; 
                  color: white; 
                  transition: all 0.3s;
                   text-decoration: none; 
                }
        .social-links a:hover { 
            background: var(--accent-rose); 
            transform: translateY(-5px) rotate(360deg); 
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .cart-item { grid-template-columns: 80px 1fr; gap: 1rem; }
            .cart-item img { width: 80px; height: 60px; }
            .item-price { text-align: left; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="images/logo-icon.png" alt="MOTO PREMIUM" class="logo-img">
                <span class="logo-text">MOTO <span>PREMIUM</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="about.html">О компании</a></li>
                <li><a href="services.html">Услуги</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="reviews.html">Отзывы</a></li>
                <li><a href="delivery.html">Доставка</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="register.html" class="btn-register">Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-hero">
        <h1 class="page-title">Корзина</h1>
    </section>

    <section class="cart-section">
        <div id="cartContent"></div>
    </section>

    <footer>
        <div style="font-family:'Playfair Display'; font-size:1.8rem; margin-bottom:1rem;">MOTO <span style="color:var(--accent-rose)">PREMIUM</span></div>
        <div class="social-links">
            <a href="#"><i class="fab fa-vk"></i></a>
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
        <p style="opacity:0.6;">&copy; 2026 MOTO PREMIUM. Все права защищены.</p>
    </footer>

    <script>
        const products = [
            { 
            id: 1,
             name: "Yamaha YZF-R1", 
             category: "Спортивный", 
             price: 1850000, 
             image: "images/Yamaha YZF-R1.jpg"
             },
            {
                 id: 2, 
                 name: "Harley-Davidson Fat Boy",
                 category: "Круизер", 
                 price: 2100000, 
                 image: "images/Harley-Davidson Fat Boy.jpg" 
            },
            {
                 id: 3, 
                 name: "BMW R 1250 RT", 
                 category: "Туристический", 
                 price: 2350000, 
                 image: "images/BMW R 1250 RT.jpg" 
            },
            {
                 id: 4, 
                 name: "Ducati Panigale V4", 
                 category: "Спортивный", 
                 price: 2650000, 
                 image: "images/Ducati Panigale V4.jpg" 
            },
            { 
                id: 5, 
                name: "Kawasaki Ninja ZX-10R", 
                category: "Спортивный", price: 1750000, 
                image: "images/Kawasaki Ninja ZX-10R.jpg"
             },
            { 
                id: 6, 
                name: "BMW R 1250 GS", 
                category: "Приключенческий", 
                price: 2200000, 
                image: "images/BMW R 1250 GS.jpg" 
            },
        ];

        function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
        function saveCart(cart) { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); renderCart(); }

        function updateCartCount() {
            const cart = getCart();
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Корзина пуста</h2>
                        <p>Добавьте мотоциклы из каталога</p>
                        <a href="catalog.html" class="btn-register" style="display:inline-block; text-decoration:none; color:white;">Перейти в каталог</a>
                    </div>`;
                return;
            }

            let total = 0;
            const itemsHtml = cart.map(item => {
                const product = products.find(p => p.id === item.id);
                const itemTotal = product.price * item.qty;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <img src="${product.image}" alt="${product.name}">
                        <div class="cart-item-info">
                            <h3>${product.name}</h3>
                            <p>${product.category}</p>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                        <div class="item-price">${itemTotal.toLocaleString('ru-RU')} ₽</div>
                        <button class="remove-btn" onclick="removeItem(${item.id})"><i class="fas fa-trash"></i></button>
                    </div>`;
            }).join('');

            container.innerHTML = `
                <div class="cart-items">${itemsHtml}</div>
                <div class="cart-summary">
                    <div class="summary-row"><span>Товары (${cart.reduce((s,i)=>s+i.qty,0)} шт.)</span><span>${total.toLocaleString('ru-RU')} ₽</span></div>
                    <div class="summary-row"><span>Доставка</span><span>Бесплатно</span></div>
                    <div class="summary-row total"><span>Итого:</span><span>${total.toLocaleString('ru-RU')} ₽</span></div>
                    <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
                    <a href="catalog.html" class="back-link">← Продолжить покупки</a>
                </div>`;
        }

        function changeQty(id, delta) {
            const cart = getCart();
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    const idx = cart.findIndex(i => i.id === id);
                    cart.splice(idx, 1);
                }
                saveCart(cart);
            }
        }

        function removeItem(id) {
            const cart = getCart().filter(i => i.id !== id);
            saveCart(cart);
        }

        function checkout() {
            alert('Спасибо за заказ! Наш менеджер свяжется с вами в ближайшее время.');
            localStorage.removeItem('cart');
            updateCartCount();
            renderCart();
        }

        renderCart();
        updateCartCount();
    </script>
</body>
</html>
